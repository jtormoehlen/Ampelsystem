<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitzplan Ampel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Klassenraum Übersicht</h1>
    
    <!-- SCHÜLER-BEREICH -->
    <div id="student-view" style="display: none; text-align: center; margin-top: 50px;">
        <h2 id="student-title">Mein Platz</h2>
        <div class="seat" id="my-seat-btn" data-state="0" style="width: 250px; height: 150px; font-size: 1.5rem; margin: 0 auto; display: flex; text-align: center; padding: 10px;">
            Hilfe rufen
        </div>
        <p id="cooldown-msg" style="color: red; display: none; margin-top: 20px; font-weight: bold;">Bitte kurz warten...</p>
    </div>

    <!-- LEHRER-BEREICH -->
    <div id="teacher-view">
        <div class="teacher-desk">Lehrerpult (Tafel)</div>
        
        <!-- Das neue Raster (9x8 Grid) -->
        <div class="classroom">
            
            <!-- Linker Außenflügel (Reihe 1-8, Spalte 1) -->
            <div class="seat" id="T1" style="grid-column: 1; grid-row: 1;" data-state="0" onclick="toggleSeat('T1')">1</div>
            <div class="seat" id="T2" style="grid-column: 1; grid-row: 2;" data-state="0" onclick="toggleSeat('T2')">2</div>
            <div class="seat" id="T3" style="grid-column: 1; grid-row: 3;" data-state="0" onclick="toggleSeat('T3')">3</div>
            <div class="seat" id="T4" style="grid-column: 1; grid-row: 4;" data-state="0" onclick="toggleSeat('T4')">4</div>
            <div class="seat" id="T5" style="grid-column: 1; grid-row: 5;" data-state="0" onclick="toggleSeat('T5')">5</div>
            <div class="seat" id="T6" style="grid-column: 1; grid-row: 6;" data-state="0" onclick="toggleSeat('T6')">6</div>
            <div class="seat" id="T7" style="grid-column: 1; grid-row: 7;" data-state="0" onclick="toggleSeat('T7')">7</div>
            <div class="seat" id="T8" style="grid-column: 1; grid-row: 8;" data-state="0" onclick="toggleSeat('T8')">8</div>

            <!-- Untere Querreihe (Reihe 8, Spalte 2-9) -->
            <div class="seat" id="T9" style="grid-column: 2; grid-row: 8;" data-state="0" onclick="toggleSeat('T9')">9</div>
            <div class="seat" id="T10" style="grid-column: 3; grid-row: 8;" data-state="0" onclick="toggleSeat('T10')">10</div>
            <div class="seat" id="T11" style="grid-column: 4; grid-row: 8;" data-state="0" onclick="toggleSeat('T11')">11</div>
            <div class="seat" id="T12" style="grid-column: 5; grid-row: 8;" data-state="0" onclick="toggleSeat('T12')">12</div>
            <div class="seat" id="T13" style="grid-column: 6; grid-row: 8;" data-state="0" onclick="toggleSeat('T13')">13</div>
            <div class="seat" id="T14" style="grid-column: 7; grid-row: 8;" data-state="0" onclick="toggleSeat('T14')">14</div>
            <div class="seat" id="T15" style="grid-column: 8; grid-row: 8;" data-state="0" onclick="toggleSeat('T15')">15</div>
            <div class="seat" id="T16" style="grid-column: 9; grid-row: 8;" data-state="0" onclick="toggleSeat('T16')">16</div>

            <!-- Rechter Außenflügel (Reihe 2-7, Spalte 9) -->
            <div class="seat" id="T17" style="grid-column: 9; grid-row: 2;" data-state="0" onclick="toggleSeat('T17')">17</div>
            <div class="seat" id="T18" style="grid-column: 9; grid-row: 3;" data-state="0" onclick="toggleSeat('T18')">18</div>
            <div class="seat" id="T19" style="grid-column: 9; grid-row: 4;" data-state="0" onclick="toggleSeat('T19')">19</div>
            <div class="seat" id="T20" style="grid-column: 9; grid-row: 5;" data-state="0" onclick="toggleSeat('T20')">20</div>
            <div class="seat" id="T21" style="grid-column: 9; grid-row: 6;" data-state="0" onclick="toggleSeat('T21')">21</div>
            <div class="seat" id="T22" style="grid-column: 9; grid-row: 7;" data-state="0" onclick="toggleSeat('T22')">22</div>

            <!-- Inneres U: Linker Flügel (Reihe 1-6, Spalte 4) -->
            <div class="seat" id="T23" style="grid-column: 4; grid-row: 1;" data-state="0" onclick="toggleSeat('T23')">23</div>
            <div class="seat" id="T24" style="grid-column: 4; grid-row: 2;" data-state="0" onclick="toggleSeat('T24')">24</div>
            <div class="seat" id="T25" style="grid-column: 4; grid-row: 3;" data-state="0" onclick="toggleSeat('T25')">25</div>
            <div class="seat" id="T26" style="grid-column: 4; grid-row: 4;" data-state="0" onclick="toggleSeat('T26')">26</div>
            <div class="seat" id="T27" style="grid-column: 4; grid-row: 5;" data-state="0" onclick="toggleSeat('T27')">27</div>
            <div class="seat" id="T28" style="grid-column: 4; grid-row: 6;" data-state="0" onclick="toggleSeat('T28')">28</div>

            <!-- Inneres U: Mittelstück (Reihe 6, Spalte 5) -->
            <div class="seat" id="T29" style="grid-column: 5; grid-row: 6;" data-state="0" onclick="toggleSeat('T29')">29</div>

            <!-- Inneres U: Rechter Flügel (Reihe 1-6, Spalte 6) -->
            <div class="seat" id="T30" style="grid-column: 6; grid-row: 1;" data-state="0" onclick="toggleSeat('T30')">30</div>
            <div class="seat" id="T31" style="grid-column: 6; grid-row: 2;" data-state="0" onclick="toggleSeat('T31')">31</div>
            <div class="seat" id="T32" style="grid-column: 6; grid-row: 3;" data-state="0" onclick="toggleSeat('T32')">32</div>
            <div class="seat" id="T33" style="grid-column: 6; grid-row: 4;" data-state="0" onclick="toggleSeat('T33')">33</div>
            <div class="seat" id="T34" style="grid-column: 6; grid-row: 5;" data-state="0" onclick="toggleSeat('T34')">34</div>
            <div class="seat" id="T35" style="grid-column: 6; grid-row: 6;" data-state="0" onclick="toggleSeat('T35')">35</div>

        </div>

        <div class="teacher-controls">
            <button onclick="resetAll()">Alle zurücksetzen (Neustart)</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
